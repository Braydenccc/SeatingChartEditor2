name: Deploy to Retinbox Web Hosting

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - dev

jobs:
  # ── 生产环境：main 分支 → sce.jbyc.cc ─────────────────────────────────────
  deploy-production:
    name: 🚀 Production (sce.jbyc.cc)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Set build time
        run: echo "VITE_APP_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build:web

      # 第 1 次尝试
      - name: Deploy (1/3)
        id: d1
        continue-on-error: true
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        run: node scripts/deploy-staging.js --site sce.jbyc.cc --outdir dist

      # 第 2 次尝试（仅在第 1 次失败后执行）
      - name: Wait before retry (1→2)
        if: steps.d1.outcome == 'failure'
        run: |
          echo "::warning::Attempt 1 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (2/3)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        run: node scripts/deploy-staging.js --site sce.jbyc.cc --outdir dist

      # 第 3 次尝试（仅在第 2 次失败后执行）
      - name: Wait before retry (2→3)
        if: steps.d2.outcome == 'failure'
        run: |
          echo "::warning::Attempt 2 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (3/3)
        if: steps.d2.outcome == 'failure'
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        run: node scripts/deploy-staging.js --site sce.jbyc.cc --outdir dist


  # ── 测试环境：dev 分支 → testsce.jbyc.cc ────────────────────────────────
  deploy-staging:
    name: 🧪 Staging (testsce.jbyc.cc)
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Set build time
        run: echo "VITE_APP_BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Build for test
        run: npm run build:test

      # 第 1 次尝试
      - name: Deploy (1/3)
        id: d1
        continue-on-error: true
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        run: node scripts/deploy-staging.js --site testsce.jbyc.cc --outdir dist

      # 第 2 次尝试
      - name: Wait before retry (1→2)
        if: steps.d1.outcome == 'failure'
        run: |
          echo "::warning::Attempt 1 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (2/3)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        run: node scripts/deploy-staging.js --site testsce.jbyc.cc --outdir dist

      # 第 3 次尝试
      - name: Wait before retry (2→3)
        if: steps.d2.outcome == 'failure'
        run: |
          echo "::warning::Attempt 2 failed, retrying in 15s..."
          sleep 15

      - name: Deploy (3/3)
        if: steps.d2.outcome == 'failure'
        env:
          RTH_API_KEY: ${{ secrets.RTH_API_KEY }}
        run: node scripts/deploy-staging.js --site testsce.jbyc.cc --outdir dist

      - name: Show staging URL
        run: 'echo "Staging URL: https://testsce.jbyc.cc"'
